<!DOCTYPE html>
<html>
<head>
<title>CI/CD Project</title>
<style>
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
  font-family: Arial;
  margin-top: 100px;
  animation: fadeIn 2s ease-in;
}
h1 {
  font-size: 50px;
  animation: slideIn 2s ease;
}
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
@keyframes slideIn {
  from {transform: translateY(-50px);}
  to {transform: translateY(0);}
}
</style>
</head>
<body>
<h1>🚀 CI/CD Pipeline Working</h1>
<p>Jenkins + Docker + Docker Hub</p>
</body>
</html>
